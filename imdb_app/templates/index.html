<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentiment Analyzer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h2 {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 8px;
            border: none;
            padding: 10px;
            resize: none;
            font-size: 14px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #00c6ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0072ff;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

    </style>
</head>
<body>

<div class="container">
    <h2>🎬 IMDB Sentiment Analyzer</h2>

    <form method="POST">
        <textarea name="review" placeholder="Write your movie review..."></textarea>
        <br>
        <button type="submit">Analyze</button>
    </form>

    {% if prediction %}
        <div class="result">
            Result: {{ prediction }}
        </div>
    {% endif %}
</div>

</body>
</html>
